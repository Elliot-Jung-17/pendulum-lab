name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'  # weekly mutation run (Mon 03:17 UTC)

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      # Coverage ratchet: per-directory thresholds in vitest.config.ts can
      # only be raised, never silently regressed.
      - run: npm run test:coverage
      - run: npm run audit:legacy
      - run: npm run audit:worldclass
      - run: npm run reports
      - run: npm run build
      - run: npm run build:standalone
      - run: npm run build:lib
      # Bundle budget gate (dist JS/CSS, largest gzip chunk, standalone page).
      - run: npm run budget
      - run: npm run docs:api
      # Executable-notebook gate: structural nbformat validation + headless
      # execution of the embedded code cells with plain Python.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm run notebook:validate
      - run: npx playwright install --with-deps chromium firefox webkit
      # Includes the visual-regression (figure fingerprint), memory/soak
      # (long-run-performance.spec), bundle, storage, design, superpack,
      # and 3D-lab specs alongside the original suites.
      - run: npm run test:e2e

  julia-reference:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'
      - run: npm ci
      - run: julia -e 'using Pkg; Pkg.add(["OrdinaryDiffEq","JSON"])'
      # External Vern9 reference vs the TS GBS integrator (skips cleanly
      # when Julia setup fails, so this job never blocks a release).
      - run: npm run validate:julia

  cross-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm ci
      - run: pip install numpy scipy sympy
      # Independent external reference: SciPy DOP853 vs the TS engine.
      - run: npm run validate:cross
      # Symbolic second reference: SymPy-derived Euler-Lagrange equations
      # compared component-wise at random states (no integrator floor).
      - run: npm run validate:sympy
      # Published / closed-form literature anchors vs engine-computed values.
      - run: npm run validate:literature

  # Cross-OS smoke: the simulator boots, steps, exports, and validates on
  # Windows and macOS runners (Chromium), catching platform-specific path,
  # line-ending, and worker issues that the Linux job cannot.
  os-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run smoke

  # Mutation testing on the numerical core (integrators, linear solver,
  # chain/string/spherical physics, Melnikov, Lyapunov). Heavy, so it runs
  # weekly and on demand rather than per push; `break: 60` fails the job when
  # more than 40% of mutants survive.
  mutation:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run mutation
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
